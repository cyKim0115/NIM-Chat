<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f1a17" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>니무 · NIM Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand-block">
          <p class="brand">니무</p>
          <p class="model-label" id="modelLabel">모델 선택</p>
        </div>
        <div class="topbar-actions">
          <div class="mode-toggle" role="group" aria-label="모드">
            <button type="button" class="mode-btn" data-mode="chat" id="modeChat">
              채팅
            </button>
            <button type="button" class="mode-btn" data-mode="agent" id="modeAgent">
              에이전트
            </button>
          </div>
          <button type="button" class="icon-btn" id="settingsBtn" aria-label="설정">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path
                fill="currentColor"
                d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Zm9.4 3.1-.9-.5a7.7 7.7 0 0 0 .1-1.2l.9-.6a.8.8 0 0 0 .2-1l-1.1-1.9a.8.8 0 0 0-1-.3l-1 .4a7.6 7.6 0 0 0-1-.6l-.2-1.1a.8.8 0 0 0-.8-.6h-2.2a.8.8 0 0 0-.8.6l-.2 1.1c-.35.14-.68.32-1 .52l-1-.4a.8.8 0 0 0-1 .3L8.3 7.3a.8.8 0 0 0 .2 1l.9.6c0 .4 0 .8.1 1.2l-.9.5a.8.8 0 0 0-.3 1l.6 2a.8.8 0 0 0 1 .5l1-.3c.3.2.64.4 1 .5l.2 1.1a.8.8 0 0 0 .8.6h2.2a.8.8 0 0 0 .8-.6l.2-1.1c.36-.14.7-.32 1-.52l1 .3a.8.8 0 0 0 1-.5l.6-2a.8.8 0 0 0-.3-1Z"
              />
            </svg>
          </button>
        </div>
      </header>

      <main class="transcript" id="transcript" aria-live="polite">
        <section class="empty" id="emptyState">
          <h1 class="empty-brand">니무</h1>
          <p class="empty-copy">
            안녕하세요, 니무입니다. 선택한 LLM 제공자로 대화할 수 있어요. 키는 이
            기기에만 저장됩니다.
          </p>
          <button type="button" class="ghost-btn" id="openSettingsFromEmpty">
            API 키 설정
          </button>
        </section>
      </main>

      <footer class="composer">
        <form id="chatForm" class="composer-form">
          <textarea
            id="prompt"
            rows="1"
            placeholder="메시지를 입력하세요"
            enterkeyhint="send"
            autocomplete="off"
          ></textarea>
          <button type="submit" class="send-btn" id="sendBtn" aria-label="보내기">
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
              <path fill="currentColor" d="M3.4 20.6 21 12 3.4 3.4l-.1 6.7L14 12 3.3 13.9z" />
            </svg>
          </button>
          <button type="button" class="send-btn stop" id="stopBtn" hidden aria-label="중지">
            <span class="stop-square"></span>
          </button>
        </form>
        <div class="typing-indicator" id="typingIndicator" hidden aria-live="polite">
          <span class="typing-dots" aria-hidden="true">
            <span></span><span></span><span></span>
          </span>
          <span class="typing-label">니무가 응답 중입니다…</span>
        </div>
        <p class="status" id="status" role="status"></p>
      </footer>
    </div>

    <dialog class="sheet" id="settingsDialog">
      <form method="dialog" class="sheet-panel" id="settingsForm">
        <header class="sheet-head">
          <h2>설정</h2>
          <button type="submit" class="icon-btn" value="cancel" aria-label="닫기">
            ✕
          </button>
        </header>

        <label class="field">
          <span>제공자 (Provider)</span>
          <select id="provider" name="provider">
            <option value="nim">NVIDIA NIM</option>
            <option value="openai">OpenAI</option>
            <option value="deepseek">DeepSeek</option>
            <option value="openrouter">OpenRouter</option>
            <option value="local">로컬 (Ollama / LM Studio 등)</option>
          </select>
          <small>선택한 제공자의 설정만 표시·사용됩니다.</small>
        </label>

        <fieldset class="provider-group" id="nimGroup" data-provider="nim">
          <legend>NVIDIA NIM</legend>
          <label class="field">
            <span>NIM API 키</span>
            <input
              type="password"
              id="nimApiKey"
              name="nimApiKey"
              placeholder="nvapi-..."
              autocomplete="off"
              spellcheck="false"
            />
            <small id="nimApiKeyStatus" class="field-status"></small>
          </label>
        </fieldset>

        <fieldset class="provider-group" id="openaiGroup" data-provider="openai" hidden>
          <legend>OpenAI</legend>
          <label class="field">
            <span>OpenAI API 키</span>
            <input
              type="password"
              id="openaiApiKey"
              name="openaiApiKey"
              placeholder="sk-..."
              autocomplete="off"
              spellcheck="false"
            />
            <small id="openaiApiKeyStatus" class="field-status"></small>
          </label>
          <label class="field">
            <span>OpenAI Base URL</span>
            <input
              type="text"
              id="openaiBaseUrl"
              name="openaiBaseUrl"
              placeholder="https://api.openai.com/v1"
              autocomplete="off"
              spellcheck="false"
            />
          </label>
        </fieldset>

        <fieldset class="provider-group" id="deepseekGroup" data-provider="deepseek" hidden>
          <legend>DeepSeek</legend>
          <label class="field">
            <span>DeepSeek API 키</span>
            <input
              type="password"
              id="deepseekApiKey"
              name="deepseekApiKey"
              placeholder="sk-..."
              autocomplete="off"
              spellcheck="false"
            />
            <small id="deepseekApiKeyStatus" class="field-status"></small>
          </label>
          <label class="field">
            <span>DeepSeek Base URL</span>
            <input
              type="text"
              id="deepseekBaseUrl"
              name="deepseekBaseUrl"
              placeholder="https://api.deepseek.com/v1"
              autocomplete="off"
              spellcheck="false"
            />
          </label>
        </fieldset>

        <fieldset class="provider-group" id="openrouterGroup" data-provider="openrouter" hidden>
          <legend>OpenRouter</legend>
          <label class="field">
            <span>OpenRouter API 키</span>
            <input
              type="password"
              id="openrouterApiKey"
              name="openrouterApiKey"
              placeholder="sk-or-..."
              autocomplete="off"
              spellcheck="false"
            />
            <small id="openrouterApiKeyStatus" class="field-status"></small>
          </label>
          <label class="field">
            <span>OpenRouter Base URL</span>
            <input
              type="text"
              id="openrouterBaseUrl"
              name="openrouterBaseUrl"
              placeholder="https://openrouter.ai/api/v1"
              autocomplete="off"
              spellcheck="false"
            />
          </label>
        </fieldset>

        <fieldset class="provider-group" id="localGroup" data-provider="local" hidden>
          <legend>로컬 (Ollama / LM Studio 등)</legend>
          <label class="field">
            <span>로컬 Base URL</span>
            <input
              type="text"
              id="localBaseUrl"
              name="localBaseUrl"
              placeholder="http://127.0.0.1:11434/v1"
              autocomplete="off"
              spellcheck="false"
            />
            <small>API 키는 보통 필요 없습니다. 로컬 서버가 켜져 있어야 합니다.</small>
          </label>
        </fieldset>

        <label class="field">
          <span>모드</span>
          <select id="mode" name="mode">
            <option value="chat">채팅</option>
            <option value="agent">에이전트</option>
          </select>
        </label>

        <label class="field">
          <span>모델</span>
          <select id="model" name="model"></select>
          <small id="modelHint">에이전트 모드는 도구 지원 모델만 선택할 수 있습니다.</small>
        </label>

        <label class="field">
          <span>프록시 URL (채팅)</span>
          <input
            type="url"
            id="proxyUrl"
            name="proxyUrl"
            placeholder="/api/chat"
            spellcheck="false"
          />
          <small>기본값 <code>/api/chat</code>. 에이전트는 <code>/api/agent</code>를 사용합니다.</small>
        </label>

        <label class="field">
          <span>에이전트 URL</span>
          <input
            type="url"
            id="agentUrl"
            name="agentUrl"
            placeholder="/api/agent"
            spellcheck="false"
          />
        </label>

        <label class="field">
          <span>Brave Search API 키 (선택)</span>
          <input
            type="password"
            id="braveApiKey"
            name="braveApiKey"
            placeholder="BSA..."
            autocomplete="off"
            spellcheck="false"
          />
          <small
            >비우면 Worker의 <code>BRAVE_API_KEY</code> 시크릿을 사용합니다. 입력한
            키는 이 기기에 저장됩니다.</small
          >
        </label>

        <label class="field">
          <span>Custom instructions</span>
          <textarea
            id="customInstructions"
            name="customInstructions"
            rows="3"
            placeholder="에이전트에 추가로 전달할 짧은 지시 (최대 ~2000자)"
            spellcheck="true"
          ></textarea>
        </label>

        <div class="sheet-actions sheet-actions-wrap">
          <button type="button" class="ghost-btn" id="clearChatBtn">대화 지우기</button>
          <button type="button" class="ghost-btn" id="clearKeysBtn">키 삭제</button>
          <button type="button" class="primary-btn" id="saveSettingsBtn">저장</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
